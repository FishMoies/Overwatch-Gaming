<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试Auth修复</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        button { margin: 5px; padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>测试Auth.js修复</h1>
    
    <div class="test">
        <h3>1. 清理本地存储</h3>
        <button onclick="clearStorage()">清理存储</button>
        <div id="clearResult"></div>
    </div>
    
    <div class="test">
        <h3>2. 初始化测试数据</h3>
        <button onclick="initTestData()">初始化测试数据</button>
        <div id="initResult"></div>
    </div>
    
    <div class="test">
        <h3>3. 测试登录</h3>
        <button onclick="testLogin()">测试登录 (testuser/password123)</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="test">
        <h3>4. 测试获取当前用户（检查role字段）</h3>
        <button onclick="testGetCurrentUser()">获取当前用户</button>
        <div id="currentUserResult"></div>
    </div>
    
    <div class="test">
        <h3>5. 测试更新用户职责</h3>
        <button onclick="testUpdateRole('heavy')">更新为重装</button>
        <button onclick="testUpdateRole('damage')">更新为输出</button>
        <button onclick="testUpdateRole('support')">更新为支援</button>
        <button onclick="testUpdateRole('flexible')">更新为灵活</button>
        <div id="updateRoleResult"></div>
    </div>
    
    <script type="module">
        import auth from './src/utils/auth.js';
        
        window.clearStorage = function() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('clearResult').innerHTML = 
                '<div class="success">本地存储已清理</div>';
        };
        
        window.initTestData = function() {
            auth.initTestData();
            const users = auth.getAllUsers();
            document.getElementById('initResult').innerHTML = 
                `<div class="success">测试数据已初始化，用户数: ${users.length}</div>
                 <pre>${JSON.stringify(users, null, 2)}</pre>`;
        };
        
        window.testLogin = function() {
            const result = auth.login('testuser', 'password123');
            const resultDiv = document.getElementById('loginResult');
            if (result.success) {
                resultDiv.innerHTML = 
                    `<div class="success">登录成功！</div>
                     <pre>Session对象: ${JSON.stringify(result.user, null, 2)}</pre>
                     <p>Role字段存在: ${'role' in result.user ? '是' : '否'}</p>
                     <p>Role值: ${result.user.role || '未定义'}</p>`;
            } else {
                resultDiv.innerHTML = 
                    `<div class="error">登录失败: ${result.message}</div>`;
            }
        };
        
        window.testGetCurrentUser = function() {
            const user = auth.getCurrentUser();
            const resultDiv = document.getElementById('currentUserResult');
            if (user) {
                resultDiv.innerHTML = 
                    `<div class="success">获取当前用户成功</div>
                     <pre>${JSON.stringify(user, null, 2)}</pre>
                     <p>Role字段存在: ${'role' in user ? '是' : '否'}</p>
                     <p>Role值: ${user.role || '未定义'}</p>`;
            } else {
                resultDiv.innerHTML = 
                    `<div class="error">没有登录用户</div>`;
            }
        };
        
        window.testUpdateRole = function(role) {
            const currentUser = auth.getCurrentUser();
            if (!currentUser) {
                document.getElementById('updateRoleResult').innerHTML = 
                    '<div class="error">请先登录</div>';
                return;
            }
            
            const result = auth.updateUserRole(currentUser.id, role);
            const resultDiv = document.getElementById('updateRoleResult');
            if (result.success) {
                // 重新获取当前用户以验证更新
                const updatedUser = auth.getCurrentUser();
                resultDiv.innerHTML = 
                    `<div class="success">更新职责成功: ${role}</div>
                     <pre>更新后的Session: ${JSON.stringify(updatedUser, null, 2)}</pre>`;
            } else {
                resultDiv.innerHTML = 
                    `<div class="error">更新失败: ${result.message}</div>`;
            }
        };
    </script>
</body>
</html>
